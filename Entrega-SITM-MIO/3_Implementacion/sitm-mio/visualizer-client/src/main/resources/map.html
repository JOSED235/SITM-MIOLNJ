<!DOCTYPE html>
<html>
<head>
    <title>SITM-MIO Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map { height: 100%; width: 100%; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([3.42, -76.52], 12); // Cali
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Forzar el redimensionamiento del mapa después de la carga inicial
        setTimeout(function() {
            map.invalidateSize();
        }, 500);

        var markers = {};

        function updateBus(busId, lat, lng, lineId, time) {
            if (markers[busId]) {
                markers[busId].setLatLng([lat, lng]);
                markers[busId].setPopupContent("<b>Bus:</b> " + busId + "<br><b>Ruta:</b> " + lineId + "<br><b>Hora:</b> " + time);
            } else {
                var marker = L.marker([lat, lng]).addTo(map);
                marker.bindPopup("<b>Bus:</b> " + busId + "<br><b>Ruta:</b> " + lineId + "<br><b>Hora:</b> " + time);
                markers[busId] = marker;
            }
        }
    </script>
</body>
</html>
