<!DOCTYPE html>
<html>
<head>
    <title>SITM-MIO Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map { height: 100%; width: 100%; margin: 0; padding: 0; background-color: #f0f0f0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Configuración de Leaflet con optimizaciones de renderizado
        var map = L.map('map', {
            fadeAnimation: false,
            zoomAnimation: true,
            markerZoomAnimation: true,
            updateWhenIdle: true,
            updateWhenZooming: false
        }).setView([3.42, -76.52], 12); // Cali

        // Usar un servidor de tiles más rápido o con mejor respuesta
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            keepBuffer: 2 // Mantener más tiles en memoria para evitar huecos
        }).addTo(map);

        // Forzar el redimensionamiento del mapa de forma agresiva
        function fixMapSize() {
            map.invalidateSize();
        }
        
        window.addEventListener('load', function() {
            setTimeout(fixMapSize, 100);
            setTimeout(fixMapSize, 1000);
            setTimeout(fixMapSize, 3000);
        });

        var markers = {};

        function updateBus(busId, lat, lng, lineId, time) {
            if (markers[busId]) {
                markers[busId].setLatLng([lat, lng]);
                markers[busId].setPopupContent("<b>Bus:</b> " + busId + "<br><b>Ruta:</b> " + lineId + "<br><b>Hora:</b> " + time);
            } else {
                var marker = L.marker([lat, lng]).addTo(map);
                marker.bindPopup("<b>Bus:</b> " + busId + "<br><b>Ruta:</b> " + lineId + "<br><b>Hora:</b> " + time);
                markers[busId] = marker;
            }
        }
    </script>
</body>
</html>
