<!DOCTYPE html>
<html>
<head>
    <title>SITM-MIO Monitoring</title>
    <meta charset="UTF-8">
    <script>
        // JavaFX WebView puede renderizar mal los translate3d() que usa Leaflet.
        // Esta bandera debe definirse antes de cargar Leaflet.
        window.L_DISABLE_3D = true;
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #e0e0e0;
        }
        #map {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #d8d8d8;
        }
        .leaflet-container,
        .leaflet-pane,
        .leaflet-tile-pane,
        .leaflet-map-pane {
            backface-visibility: visible;
            transform-style: flat;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var markers = {};
        var map = null;
        var tileLayer = null;
        var pollCount = 0;

        /*
         * Espera activamente a que el contenedor tenga dimensiones reales antes
         * de inicializar Leaflet. En JavaFX WebView el layout ocurre despues del
         * DOMContentLoaded, por lo que leer offsetWidth inmediatamente devuelve 0.
         */
        function tryInit() {
            var el = document.getElementById('map');
            var w = el.offsetWidth;
            var h = el.offsetHeight;

            if ((w < 100 || h < 100) && pollCount < 80) {
                pollCount++;
                setTimeout(tryInit, 50);
                return;
            }

            if (map) return;
            console.log("Iniciando mapa con dimensiones: " + w + "x" + h);

            map = L.map('map', {
                fadeAnimation: false,
                zoomAnimation: false,
                markerZoomAnimation: false,
                preferCanvas: true,
                updateWhenIdle: true,
                updateWhenZooming: false
            }).setView([3.42, -76.52], 13);

            tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19,
                keepBuffer: 6,
                updateWhenIdle: true,
                updateWhenZooming: false
            }).addTo(map);

            // Alinear tiles una vez que Leaflet ya tiene las dimensiones correctas
            scheduleResize();
        }

        function forceResize() {
            if (!map) {
                tryInit();
                return;
            }
            scheduleResize();
        }

        function scheduleResize() {
            var delays = [0, 100, 300, 700];
            for (var i = 0; i < delays.length; i++) {
                setTimeout(function() {
                    if (!map) return;
                    map.invalidateSize({ animate: false, pan: false });
                    if (tileLayer) tileLayer.redraw();
                }, delays[i]);
            }
        }

        function updateBus(busId, lat, lng, lineId, time) {
            if (!map) return;
            var pos = [lat, lng];
            if (markers[busId]) {
                markers[busId].setLatLng(pos);
                markers[busId].getPopup().setContent(
                    "<b>Bus:</b> " + busId + "<br><b>Ruta:</b> " + lineId + "<br><b>Hora:</b> " + time
                );
            } else {
                var marker = L.circleMarker(pos, {
                    radius: 8,
                    fillColor: "#0078ff",
                    color: "#ffffff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);
                marker.bindPopup(
                    "<b>Bus:</b> " + busId + "<br><b>Ruta:</b> " + lineId + "<br><b>Hora:</b> " + time
                );
                markers[busId] = marker;
            }
        }

        document.addEventListener('DOMContentLoaded', tryInit);
        window.addEventListener('resize', forceResize);
    </script>
</body>
</html>
